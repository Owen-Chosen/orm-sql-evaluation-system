server:
  port: 8080

spring:
  application:
    name: orm-vs-jdbc-research

  profiles:
    active: orm

  datasource:
    url: jdbc:postgresql://localhost:5432/orm_vs_jdbc_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none

logging:
  level:
    root: INFO