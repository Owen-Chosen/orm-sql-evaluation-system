spring:
  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        format_sql: true
        show_sql: true

        # Disable caching for fair comparison
        cache:
          use_second_level_cache: false
          use_query_cache: false

        generate_statistics: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE